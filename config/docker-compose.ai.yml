# MSB LiveKit AI Services - Docker Compose Configuration
# Services: LLM (Ollama), STT (Faster-Whisper), TTS (Coqui)

services:
  # ---------------------------------------------------------------------------
  # Ollama: Local LLM Inference Server
  # Supports: Llama 3.1/3.2, Mistral, Qwen 2.5, Phi-3.5, Gemma 2, Hermes 3, SmolLM2
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: msb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - msb-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  # ---------------------------------------------------------------------------
  # Faster-Whisper: High-performance Speech-to-Text
  # Models: tiny, base, small, medium, large-v2, large-v3
  # ---------------------------------------------------------------------------
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: faster-whisper
    ports:
      - "9000:8000"
    volumes:
      - whisper_models:/models
    environment:
      - WHISPER_MODEL=medium
      - WHISPER_COMPUTE_TYPE=int8
    networks:
      - msb-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Coqui TTS: High-quality Text-to-Speech
  # Supports: XTTS, OpenVoice, VALL-E
  # ---------------------------------------------------------------------------
  coqui-tts:
    image: ghcr.io/coqui-ai/tts:latest
    container_name: coqui-tts
    entrypoint: ["tts-server"]
    command:
      - "--model_name"
      - "tts_models/es/css10/vits"
      - "--port"
      - "5002"
    ports:
      - "5002:5002"
    volumes:
      - tts_models:/root/.local/share/tts
    networks:
      - msb-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

  # ---------------------------------------------------------------------------
  # Kokoro TTS: Lightweight Text-to-Speech
  # CPU-friendly fast synthesis running on port 8001
  # ---------------------------------------------------------------------------
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    ports:
      - "8001:8880"
    networks:
      - msb-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Vosk STT English: Port 2700
  vosk-en:
    image: alphacep/kaldi-en:latest
    container_name: msb-vosk-en
    ports:
      - "2700:2700"
    volumes:
      - vosk_models_en:/models
    networks:
      - msb-network
    restart: unless-stopped

  # Vosk STT Spanish: Port 2701
  vosk-es:
    image: alphacep/kaldi-es:latest
    container_name: msb-vosk-es
    ports:
      - "2701:2700"
    volumes:
      - vosk_models_es:/models
    networks:
      - msb-network
    restart: unless-stopped

networks:
  msb-network:
    driver: bridge

volumes:
  ollama_data:
  whisper_models:
  tts_models:
  vosk_models_en:
  vosk_models_es:
  kokoro_models:
