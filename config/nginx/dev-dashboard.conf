upstream livekit_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name livekit.alvarezconsult.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name livekit.alvarezconsult.com;

    ssl_certificate /etc/letsencrypt/live/livekit.alvarezconsult.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.alvarezconsult.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;

    root /home/ubuntu/LIVEKIT/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://livekit_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /ws {
        proxy_pass http://livekit_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /dashboard/ {
        alias /home/ubuntu/LIVEKIT/dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location /dev/ {
        alias /home/ubuntu/LIVEKIT/dev-dashboard/dist/;
        try_files $uri $uri/ /dev/index.html;
    }

    location /health {
        proxy_pass http://livekit_backend/api/health;
        access_log off;
    }

    access_log /var/log/nginx/livekit.access.log;
    error_log /var/log/nginx/livekit.error.log;
}
